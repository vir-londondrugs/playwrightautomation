name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      # ---------------------------------------------------------------
      # Publish JUnit results to ADO Test Plans > Runs
      # Runs even if tests fail (if: always) so every run is recorded.
      # Requires secret ADO_PAT with scope: Test Management (Read & write)
      # ---------------------------------------------------------------
      - name: Publish results to ADO Test Plans
        if: always()
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: python3 scripts/publish-ado-results.py

      # ---------------------------------------------------------------
      # Upload interactive HTML report as pipeline artifact
      # ---------------------------------------------------------------
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
